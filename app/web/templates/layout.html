<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QA AI Platform</title>
    <style>
        body{font-family:Arial,sans-serif;margin:0;background:#f5f7fb;color:#111827}
        header{height:44px;background:#111827;color:white;position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;padding:0 16px;box-sizing:border-box}
        header h1{font-size:17px;margin:0}
        main{padding:56px 12px 18px}
        .portal-layout{display:grid;grid-template-columns:232px minmax(0,1fr);gap:12px;align-items:start}
        .sidebar{position:sticky;top:56px;height:calc(100vh - 68px);overflow-y:auto;background:white;border:1px solid #e5e7eb;border-radius:10px;padding:10px;box-shadow:0 1px 5px rgba(0,0,0,.07);box-sizing:border-box}
        .content-area{min-width:0}
        .sidebar-back{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:#f3f4f6;color:#111827;text-decoration:none;font-size:21px;font-weight:bold;margin-bottom:8px}
        .side-title{font-size:12px;font-weight:bold;color:#6b7280;text-transform:uppercase;margin:12px 6px 5px}
        .side-tab,.side-link,.side-action{display:block;width:100%;box-sizing:border-box;border:0;background:transparent;text-align:left;text-decoration:none;color:#374151;padding:6px 8px;border-radius:6px;font-size:13px;line-height:16px;cursor:pointer}
        .side-tab{font-weight:bold}
        .side-tab.active{background:#2563eb;color:white}
        .side-link{font-size:12px;color:#4b5563;padding-left:14px}
        .side-action{padding-left:18px}
        .side-link:hover,.side-action:hover,.side-tab:hover{background:#f3f4f6;color:#111827}
        .side-tab.active:hover{background:#2563eb;color:white}
        .side-form{margin:0}
        details.side-details{margin-top:8px}
        details.side-details summary{cursor:pointer;font-size:12px;font-weight:bold;color:#6b7280;text-transform:uppercase;margin:8px 6px}
        .danger-link,.danger-action{color:#991b1b!important}
        .card{background:white;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:14px;box-shadow:0 1px 5px rgba(0,0,0,.06)}
        .section-header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
        .section-header h3{margin:0}
        .section-block{border:1px solid #e5e7eb;border-radius:8px;background:#f9fafb;padding:12px;margin:10px 0}
        .section-title{font-weight:bold;margin-bottom:8px}
        input,textarea,select,button{font-size:14px}
        input,textarea{width:100%;box-sizing:border-box;margin:6px 0 12px;padding:9px}
        button,.button{background:#2563eb;color:white;border:0;border-radius:6px;padding:8px 12px;cursor:pointer;text-decoration:none;display:inline-block;line-height:18px;box-sizing:border-box;font-size:13px}
        .secondary{background:#4b5563!important}.success{background:#059669!important}.warning{background:#d97706!important}.danger{background:#dc2626!important}
        button:disabled{opacity:.6;cursor:not-allowed}
        pre{background:#111827;color:#e5e7eb;padding:12px;border-radius:8px;overflow:auto;max-height:520px;white-space:pre-wrap;font-size:12px}
        .status{display:inline-block;padding:3px 8px;border-radius:999px;background:#e5e7eb;margin:0 6px 6px 0;font-size:12px}
        .status.ok{background:#d1fae5;color:#065f46}.status.missing{background:#fee2e2;color:#991b1b}
        .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin:12px 0}
        .metric-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px}
        .metric-label{font-size:12px;color:#6b7280}.metric-value{font-size:22px;font-weight:bold}
        .visual-table{width:100%;border-collapse:collapse;font-size:13px}
        .visual-table th,.visual-table td{border-bottom:1px solid #e5e7eb;padding:8px;vertical-align:top;text-align:left}
        .visual-table th{background:#f3f4f6}
        .badge{display:inline-block;padding:3px 7px;border-radius:999px;font-size:12px;font-weight:bold;background:#e5e7eb}
        .badge.high{background:#fee2e2;color:#991b1b}.badge.medium{background:#fef3c7;color:#92400e}.badge.low{background:#d1fae5;color:#065f46}
        .info-list{margin:0;padding-left:18px}.info-list li{margin-bottom:5px}
        .question-card{border:1px solid #e5e7eb;border-left:4px solid #d97706;border-radius:8px;padding:12px;margin-bottom:10px;background:#fffbeb}
        .question-id{font-weight:bold;color:#92400e;margin-bottom:6px}
        .placeholder-box{border:1px dashed #9ca3af;background:#f9fafb;padding:14px;border-radius:8px;color:#374151}
        .version-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:12px}
        .version-toolbar form{display:flex;gap:8px;align-items:center;margin:0}.version-toolbar select{min-width:180px}
        .editor-textarea{min-height:360px;font-family:Consolas,monospace;font-size:12px;white-space:pre}
        .mini-actions{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}
        .loading-overlay{display:none;position:fixed;inset:0;background:rgba(17,24,39,.72);z-index:9999;align-items:center;justify-content:center;color:white}
        .loading-box{background:#111827;padding:24px 32px;border-radius:12px;text-align:center;min-width:300px}
        .spinner{width:38px;height:38px;border:4px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;margin:0 auto 14px;animation:spin .9s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        @media(max-width:900px){.portal-layout{grid-template-columns:1fr}.sidebar{position:relative;top:0;height:auto}}
    </style>
</head>
<body>
<header><h1>QA AI Platform - Web Portal</h1></header>
<main>{% block content %}{% endblock %}</main>
<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-box">
        <div class="spinner"></div>
        <div id="loadingTitle"><b>Processing...</b></div>
        <div id="loadingMessage">Please wait. This may take a few minutes.</div>
    </div>
</div>
<script>
function showLoading(title,message){
    document.getElementById("loadingTitle").innerHTML="<b>"+(title||"Processing...")+"</b>";
    document.getElementById("loadingMessage").textContent=message||"Please wait. This may take a few minutes.";
    document.getElementById("loadingOverlay").style.display="flex";
    document.querySelectorAll("button").forEach(b=>b.disabled=true);
}
document.addEventListener("DOMContentLoaded",()=>{
    document.querySelectorAll("form[data-loading='true']").forEach(form=>{
        form.addEventListener("submit",()=>{
            showLoading(form.getAttribute("data-loading-title"),form.getAttribute("data-loading-message"));
        });
    });
});
</script>
</body>
</html>
