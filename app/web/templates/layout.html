<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QA AI Platform</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f7fb;
            color: #222;
        }

        header {
            background: #111827;
            color: white;
            padding: 16px 32px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            box-sizing: border-box;
            height: 56px;
        }

        header h1 {
            margin: 0;
            font-size: 20px;
            line-height: 24px;
        }

        main {
            padding: 80px 32px 32px 32px;
        }

        .portal-layout {
            display: grid;
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 24px;
            align-items: start;
        }

        .sidebar {
            position: sticky;
            top: 80px;
            height: calc(100vh - 104px);
            overflow-y: auto;
            background: white;
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
            box-sizing: border-box;
        }

        .content-area {
            min-width: 0;
        }

        .sidebar-back {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #111827;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px 12px;
            border-radius: 8px;
            background: #f3f4f6;
        }

        .sidebar-back:hover {
            background: #e5e7eb;
        }

        .sidebar-back-icon {
            font-size: 20px;
            line-height: 1;
        }

        .sidebar-section {
            margin-bottom: 22px;
        }

        .sidebar-title {
            font-size: 12px;
            font-weight: bold;
            color: #6b7280;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.04em;
        }

        .sidebar-link {
            display: block;
            padding: 8px 10px;
            border-radius: 6px;
            color: #374151;
            text-decoration: none;
            margin-bottom: 4px;
            font-size: 14px;
        }

        .sidebar-link:hover {
            background: #f3f4f6;
        }

        .sidebar-link.active {
            background: #2563eb;
            color: white;
            font-weight: bold;
        }

        .sidebar-button {
            width: 100%;
            display: block;
            text-align: left;
            margin-bottom: 8px;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .sidebar-section form {
            margin: 0;
        }

        .sidebar-danger-zone {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
        }

        .sidebar-danger-title {
            font-size: 12px;
            font-weight: bold;
            color: #991b1b;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.04em;
        }

        .sidebar-button.danger,
        button.sidebar-button.danger {
            width: 100%;
            background: #dc2626;
            color: white;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .section-header h3 {
            margin: 0;
        }

        input,
        textarea,
        button {
            font-size: 14px;
            padding: 10px;
        }

        input,
        textarea {
            width: 100%;
            box-sizing: border-box;
            margin-top: 8px;
            margin-bottom: 16px;
        }

        button,
        .button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 0;
            line-height: 18px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .button.secondary,
        button.secondary {
            background: #4b5563;
        }

        .button.success,
        button.success {
            background: #059669;
        }

        .button.warning,
        button.warning {
            background: #d97706;
        }

        .button.danger,
        button.danger {
            background: #dc2626;
        }

        button:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        pre {
            background: #111827;
            color: #e5e7eb;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            max-height: 500px;
            white-space: pre-wrap;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th {
            background: #f3f4f6;
        }

        td,
        th {
            padding: 8px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            vertical-align: top;
        }

        .status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: #e5e7eb;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .status.ok {
            background: #d1fae5;
            color: #065f46;
        }

        .status.missing {
            background: #fee2e2;
            color: #991b1b;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-top: 16px;
            margin-bottom: 16px;
        }

        .metric-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
        }

        .metric-label {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 26px;
            font-weight: bold;
            color: #111827;
        }

        .visual-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 14px;
        }

        .visual-table th {
            background: #f3f4f6;
            color: #374151;
            font-weight: bold;
        }

        .visual-table th,
        .visual-table td {
            border-bottom: 1px solid #e5e7eb;
            padding: 10px;
            vertical-align: top;
            text-align: left;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
            background: #e5e7eb;
            color: #374151;
        }

        .badge.high {
            background: #fee2e2;
            color: #991b1b;
        }

        .badge.medium {
            background: #fef3c7;
            color: #92400e;
        }

        .badge.low {
            background: #d1fae5;
            color: #065f46;
        }

        .info-list {
            margin: 0;
            padding-left: 18px;
        }

        .info-list li {
            margin-bottom: 6px;
        }

        .question-card {
            border: 1px solid #e5e7eb;
            border-left: 5px solid #d97706;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            background: #fffbeb;
        }

        .question-id {
            font-weight: bold;
            color: #92400e;
            margin-bottom: 8px;
        }

        .section-block {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            background: #f9fafb;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #111827;
        }

        .placeholder-box {
            border: 1px dashed #9ca3af;
            background: #f9fafb;
            padding: 20px;
            border-radius: 10px;
            color: #374151;
        }

        .version-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .version-toolbar form {
            display: flex;
            gap: 8px;
            align-items: center;
            margin: 0;
        }

        .version-toolbar select {
            width: auto;
            min-width: 220px;
            margin: 0;
        }

        .editor-textarea {
            width: 100%;
            min-height: 420px;
            font-family: Consolas, monospace;
            font-size: 13px;
            white-space: pre;
        }

        details.card summary {
            cursor: pointer;
            font-weight: bold;
        }

        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.72);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .loading-box {
            background: #111827;
            padding: 28px 36px;
            border-radius: 12px;
            text-align: center;
            min-width: 320px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
        }

        .spinner {
            width: 42px;
            height: 42px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            margin: 0 auto 16px auto;
            animation: spin 0.9s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .loading-message {
            font-size: 14px;
            color: #d1d5db;
        }

        @media (max-width: 960px) {
            main {
                padding: 72px 16px 24px 16px;
            }

            .portal-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                top: 0;
                height: auto;
                overflow: visible;
            }
        }
    </style>
</head>

<body>
<header>
    <h1>QA AI Platform - Web Portal</h1>
</header>

<main>
    {% block content %}
    {% endblock %}
</main>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-box">
        <div class="spinner"></div>

        <div id="loadingTitle" class="loading-title">
            Processing...
        </div>

        <div id="loadingMessage" class="loading-message">
            Please wait. This may take a few minutes.
        </div>
    </div>
</div>

<script>
    function showLoading(title, message) {
        const overlay = document.getElementById("loadingOverlay");
        const titleElement = document.getElementById("loadingTitle");
        const messageElement = document.getElementById("loadingMessage");

        if (titleElement) {
            titleElement.textContent = title || "Processing...";
        }

        if (messageElement) {
            messageElement.textContent = message || "Please wait. This may take a few minutes.";
        }

        if (overlay) {
            overlay.style.display = "flex";
        }

        const buttons = document.querySelectorAll("button");

        buttons.forEach((button) => {
            button.disabled = true;
        });
    }

    document.addEventListener("DOMContentLoaded", function () {
        const forms = document.querySelectorAll("form[data-loading='true']");

        forms.forEach((form) => {
            form.addEventListener("submit", function () {
                const title = form.getAttribute("data-loading-title");
                const message = form.getAttribute("data-loading-message");

                showLoading(title, message);
            });
        });
    });
</script>
</body>
</html>
